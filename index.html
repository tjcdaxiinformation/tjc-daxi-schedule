<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }

<body class="bg-slate-50 text-slate-800 min-h-screen pb-24">

  <!-- 頂部導覽欄與每月分享經節 -->
  <header class="bg-gradient-to-r from-blue-900 to-indigo-950 text-white shadow-md relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.1),transparent_50%)]"></div>
    <div class="max-w-md mx-auto px-4 py-6 relative z-10">
      <div class="flex items-center space-x-2 mb-2">
        <span id="header-badge" class="bg-amber-500 text-slate-900 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">115年7月份</span>
        <span class="text-xs text-blue-200">真耶穌教會大溪教會</span>
      </div>
      <h1 id="header-title" class="text-xl font-black tracking-wide leading-tight text-amber-100">
        TJC 大溪教會<br/>事工快速搜尋與分享表單
      </h1>
      
      <!-- 經節卡片 -->
      <div class="mt-4 bg-white/10 backdrop-blur-sm border border-white/15 rounded-lg p-3">
        <p id="header-verse" class="text-xs text-amber-200 italic font-light">
          「凡你手所當做的事，要盡力去做。」
        </p>
        <p id="header-verse-src" class="text-[10px] text-right text-slate-300 mt-1">—— 傳道書 9:10</p>
      </div>
    </div>
  </header>

  <!-- 行動端主要容器 -->
  <main class="max-w-md mx-auto px-4 mt-4 space-y-5">

    <!-- 區塊一：來訪團契看板 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-24 h-24 bg-rose-50 rounded-full -mr-8 -mt-8 -z-10 opacity-60"></div>
      <div class="flex items-center space-x-2 mb-3">
        <div class="bg-rose-100 text-rose-600 p-1.5 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        </div>
        <h2 class="text-sm font-bold text-slate-800">本月來訪教會與用餐註記</h2>
      </div>
      
      <!-- 來訪教會動態清單 -->
      <div id="visiting-churches-list" class="space-y-2.5">
        <!-- 由 JS 自動從 CONFIG 填入 -->
      </div>

    <!-- 導覽頁籤 (Tabs) -->

      <button onclick="switchTab('search')" id="tab-search" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center space-x-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <span>全月完整事工</span>
      </button>
      <button onclick="switchTab('events')" id="tab-events" class="flex-1 text-center py-2.5 text-xs font-medium rounded-lg transition-all text-slate-600 flex items-center justify-center space-x-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        <span>教會近期活動</span>
      </button>
    </div>

    <!-- 頁籤一：個人事工查詢 -->
    <section id="content-search" class="space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <label for="searchInput" class="block text-xs font-bold text-slate-500 mb-2">請輸入您的姓名，或從下方點選名字</label>
        
        <!-- 搜尋輸入框 -->
        <div class="relative">
          <input type="text" id="searchInput" placeholder="輸入同工姓名 (如: 同恩、林茜葦...)" 
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all"
            oninput="handleSearchInput()">
          <span class="absolute left-3.5 top-3.5 text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </span>
          <button onclick="clearSearch()" id="clearBtn" class="hidden absolute right-3 top-3 text-slate-400 hover:text-slate-600 p-0.5 rounded-full hover:bg-slate-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>

        <div class="mt-4">

          <div id="quick-search-roles" class="space-y-3">
            <!-- 由 JS 自動根據 CONFIG 載入按鈕 -->
          </div>
        </div>
      </div>

      <!-- 查詢結果展示板 -->
      <div id="resultsWrapper" class="space-y-3">
        <!-- 初始化提示 -->
        <div id="emptyResultState" class="bg-white rounded-2xl p-8 border border-slate-100 text-center space-y-3 shadow-sm">
          <div class="inline-flex bg-slate-100 text-slate-400 p-3 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>

            <option value="weekday">📅 週間 (一~五)</option>

        <div id="activeEventsList" class="space-y-2.5">
          <!-- 這裡會由 JS 塞入前三項與隱藏項目 -->
        </div>

        <div class="mt-4 pt-2 border-t border-slate-100 text-center">
          <button onclick="toggleMoreEvents()" id="toggleEventsBtn" class="text-xs text-blue-600 font-bold inline-flex items-center space-x-1 hover:text-blue-800">

            <svg id="toggleIcon" class="w-3.5 h-3.5 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>

        </div>

    </section>

        { date: "7/25 (六)", category: "外出領會", title: "陳微慎 協助崎頂教會", desc: "陳微慎前往崎頂教會協助領會", personnel: ["陳微慎"] }

    function fillAdminFields() {
      document.getElementById('config-year').value = CHURCH_CONFIG.year;

    // 頁籤切換
    function switchTab(tabId) {
      const tabs = ['search', 'calendar', 'events'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        const content = document.getElementById(`content-${t}`);
        if (t === tabId) {
          btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
          btn.classList.remove('text-slate-600');
          content.classList.remove('hidden');
        } else {
          btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
          btn.classList.add('text-slate-600');
          content.classList.add('hidden');
        }
      });

    // 快捷點擊搜尋
    function quickSearch(name) {
      document.getElementById('searchInput').value = name;
      handleSearchInput();
    }

    // 搜尋欄位即時偵測
    function handleSearchInput() {
      const q = document.getElementById('searchInput').value.trim();
      const clearBtn = document.getElementById('clearBtn');
      
      if (q) {
        clearBtn.classList.remove('hidden');
        performSearch(q);
      } else {
        clearBtn.classList.add('hidden');
        showEmptyState();
      }
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').classList.add('hidden');
      showEmptyState();
    }

    function showEmptyState() {
      document.getElementById('emptyResultState').classList.remove('hidden');
      document.getElementById('searchResults').classList.add('hidden');
      currentSelectedWorker = "";
    }

    // 🧠 核心搜尋與彙整邏輯 (智慧別名與模糊配搭)
    function performSearch(name) {
      currentSelectedWorker = name;
      const listContainer = document.getElementById('searchResultsList');
      listContainer.innerHTML = '';

      // 智慧別名映射 (確保茜葦與酋葦、瑞褀與瑞祺、媐與曄均能查到)
      let aliasList = [name];
      if (name === "茜葦" || name === "酋葦" || name === "林茜葦" || name === "林酋葦") {
        aliasList = ["茜葦", "酋葦", "林茜葦", "林酋葦"];
      } else if (name === "瑞褀" || name === "瑞祺") {
        aliasList = ["瑞褀", "瑞祺"];
      } else if (name === "鍾媐" || name === "鍾曄") {
        aliasList = ["鍾媐", "鍾曄", "鍾媐", "鍾曄"];
      }

      // 1. 篩選常規事工
      const matchedDays = CHURCH_CONFIG.scheduleData.filter(item => {
        return item.personnel.some(p => aliasList.some(alias => p.includes(alias) || alias.includes(p))) || 
               aliasList.some(alias => item.rawText.includes(alias));
      });

      // 2. 篩選特別活動
      const matchedActs = CHURCH_CONFIG.activities.filter(act => {
        return act.personnel.some(p => aliasList.some(alias => p.includes(alias) || alias.includes(p))) ||
               aliasList.some(alias => act.title.includes(alias) || act.desc.includes(alias));
      });

      const totalMatches = matchedDays.length + matchedActs.length;
      document.getElementById('matchCount').innerText = totalMatches;

      if (totalMatches === 0) {
        listContainer.innerHTML = `
          <div class="bg-white rounded-xl p-6 text-center text-slate-400 border border-slate-100 text-xs">
            沒有找到屬於「${name}」的工作。請確認名字是否與安排表上完全一致，或試著只輸入名字中其中一個字。
          </div>
        `;
      } else {
        // 先顯示外出領會與活動
        matchedActs.forEach(act => {
          const card = document.createElement('div');
          card.className = "bg-purple-50/70 border-l-4 border-purple-500 rounded-xl p-3 shadow-sm relative";
          card.innerHTML = `
            <div class="absolute top-2 right-2 bg-purple-100 text-purple-800 text-[9px] font-bold px-1.5 py-0.5 rounded">
              ${act.category}
            </div>
            <p class="text-[10px] text-slate-400 font-mono">${act.date}</p>
            <h4 class="text-xs font-black text-slate-800 mt-1">${act.title}</h4>
            <p class="text-[11px] text-slate-600 mt-1 bg-white/50 p-2 rounded border border-purple-100/40">${act.desc}</p>
          `;
          listContainer.appendChild(card);
        });

        // 顯示常規安排
        matchedDays.forEach(day => {
          const card = document.createElement('div');
          let borderCol = "border-blue-500 bg-blue-50/20";
          let badge = `<span class="bg-blue-100 text-blue-800 text-[9px] font-bold px-1.5 py-0.5 rounded">週間</span>`;
          if (day.dayType === 'sabbath') {
            borderCol = "border-amber-400 bg-amber-50/30";
            badge = `<span class="bg-amber-100 text-amber-800 text-[9px] font-bold px-1.5 py-0.5 rounded">安息日</span>`;
          } else if (day.dayType === 'sunday') {
            borderCol = "border-emerald-500 bg-emerald-50/20";
            badge = `<span class="bg-emerald-100 text-emerald-800 text-[9px] font-bold px-1.5 py-0.5 rounded">主日</span>`;
          }

          // 精準匹配當天具體職責
          let dutyDetailsHtml = '';
          for (const [dutyName, personnelStr] of Object.entries(day.duties)) {
            const hasMatch = aliasList.some(alias => personnelStr.includes(alias) || alias.includes(personnelStr));
            if (hasMatch) {
              dutyDetailsHtml += `
                <div class="flex items-start text-xs mt-1">
                  <span class="font-extrabold text-blue-900 bg-blue-100/80 px-1.5 py-0.5 rounded text-[10px] shrink-0 mr-1.5">${dutyName}</span>
                  <span class="text-slate-700 font-medium">${personnelStr}</span>
                </div>
              `;
            }
          }

          if (!dutyDetailsHtml) {
            dutyDetailsHtml = `
              <div class="mt-1 bg-white/60 p-2 rounded border border-slate-100 space-y-1">
                <span class="text-[9px] text-slate-400 block mb-1">參與事工一覽：</span>
                ${Object.entries(day.duties).map(([k, v]) => `
                  <p class="text-[11px] text-slate-600"><strong class="text-slate-700">${k}:</strong> ${v}</p>
                `).join('')}
              </div>
            `;
          } else {
            dutyDetailsHtml = `
              <div class="mt-1.5 space-y-1.5">
                <p class="text-[9px] text-slate-400">您的服事項目：</p>
                ${dutyDetailsHtml}
                <div class="flex gap-2 mt-2 pt-1 border-t border-slate-100">
                  <details class="text-[11px] text-slate-500 flex-1">
                    <summary class="cursor-pointer font-bold text-blue-600 hover:underline">展開完整當天同工名單</summary>
                    <div class="mt-1 bg-slate-50/80 p-2 rounded space-y-1 border border-slate-100">
                      ${Object.entries(day.duties).map(([k, v]) => `
                        <p><strong class="text-slate-600">${k}:</strong> ${v}</p>
                      `).join('')}
                    </div>
                  </details>
                  <button onclick="copyDayLineFormat('${day.date}')" class="text-[10px] text-emerald-600 hover:text-emerald-800 font-bold shrink-0">
                    📋 一鍵複製今日 LINE 班表
                  </button>
                </div>
              </div>
            `;
          }

          card.className = `border-l-4 ${borderCol} rounded-xl p-3 shadow-sm relative`;
          card.innerHTML = `
            <div class="absolute top-2.5 right-2">
              ${badge}
            </div>
            <p class="text-[10px] text-slate-400 font-mono font-bold">${day.date}</p>
            ${dutyDetailsHtml}
          `;
          listContainer.appendChild(card);
        });
      }

      document.getElementById('emptyResultState').classList.add('hidden');
      document.getElementById('searchResults').classList.remove('hidden');
    }

    // 複製個人全月班表到 LINE
    function copyMySchedule() {
      if (!currentSelectedWorker) return;
      
      const matchedDays = CHURCH_CONFIG.scheduleData.filter(item => {
        return item.personnel.some(p => p === currentSelectedWorker || p.includes(currentSelectedWorker)) || item.rawText.includes(currentSelectedWorker);
      });
      const matchedActs = CHURCH_CONFIG.activities.filter(act => {
        return act.personnel.some(p => p === currentSelectedWorker || p.includes(currentSelectedWorker));
      });

      if (matchedDays.length === 0 && matchedActs.length === 0) return;

      let text = `【TJC大溪教會 ${CHURCH_CONFIG.year}年${CHURCH_CONFIG.month}月事工表】\n`;
      text += `同工：${currentSelectedWorker} 的專屬服事行程：\n\n`;

      matchedActs.forEach(act => {
        text += `📌 [${act.category}] ${act.date}\n  ▸ 內容: ${act.title}\n  ▸ 說明: ${act.desc}\n\n`;
      });

      matchedDays.forEach(day => {
        const typeStr = day.dayType === 'sabbath' ? '安息日' : '週間';
        text += `🗓️ [${typeStr}] ${day.date}\n`;
        for (const [k, v] of Object.entries(day.duties)) {
          if (v.includes(currentSelectedWorker)) {
            text += `  ▸ ${k}: ${v}\n`;
          }
        }
        text += `\n`;
      });

      text += `※ 請提早準備服事，若需調假請盡早聯絡各股負責人。求主紀念您的辛勞！`;
      copyToClipboardText(text);
    }

    // 一鍵複製「當天」所有事工到 LINE 格式 (格式完美對齊，傳入 LINE 超精緻)
    function copyDayLineFormat(dateStr) {
      const day = CHURCH_CONFIG.scheduleData.find(d => d.date === dateStr);
      if (!day) return;

      const titleEmoji = day.dayType === 'sabbath' ? '✨' : '📅';
      let text = `📋【TJC大溪教會 ${CHURCH_CONFIG.month}月份事工安排表】\n`;
      text += `${titleEmoji} 日期：${day.date}\n`;
      text += `----------------------------------\n`;
      
      for (const [k, v] of Object.entries(day.duties)) {
        text += `▪️ ${k}：${v}\n`;
      }
      
      text += `----------------------------------\n`;
      text += `求主紀念各位同工的辛勞與擺上，請提前預備心承接聖工！🙌`;

      copyToClipboardText(text, "當日班表已複製！可直接貼到 Line 群組");
    }

    // 核心複製邏輯
    function copyToClipboardText(text, successMsg = "班表已複製！可直接貼到 Line 群組") {
      const el = document.createElement('textarea');
      el.value = text;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      const success = document.execCommand('copy');
      document.body.removeChild(el);

      if (success) {
        showToast(successMsg);
      } else {
        showToast("複製失敗，請手動複製網頁上的文字");
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      toastText.innerText = msg;
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // 🚀 後台從 Excel 貼上匯入
    function importFromExcel() {
      const pasteText = document.getElementById('excelPasteArea').value.trim();
      if (!pasteText) {
        showToast("請先貼上 Excel 資料！");
        return;
      }

      const lines = pasteText.split('\n');
      const newSchedule = [];
      let importedCount = 0;

      const stopwords = ['安息', '上午', '下午', '接待', '傳道', '領會', '領詩', '司琴', '音控', '值日', '行程', '備註', '助理', '會計', '事務', '教育', '宣道', '資訊', '出納', '教牧', '同工', '團契', '教會', '派員', '無', '無安排', '協助', '炊事', '第五組'];

      lines.forEach(line => {
        const cols = line.split('\t');
        if (cols.length >= 2) {
          const date = cols[0].trim();
          const dayType = cols[1].trim();

          if (!date) return;

          const duties = {};
          if (cols[2] && cols[2].trim()) duties["傳道"] = cols[2].trim();
          if (cols[3] && cols[3].trim()) duties["接待"] = cols[3].trim();
          if (cols[4] && cols[4].trim()) duties["領會者"] = cols[4].trim();
          if (cols[5] && cols[5].trim()) duties["領詩"] = cols[5].trim();
          if (cols[6] && cols[6].trim()) duties["司琴"] = cols[6].trim();
          if (cols[7] && cols[7].trim()) duties["一樓二樓音控"] = cols[7].trim();
          if (cols[8] && cols[8].trim()) duties["當值值日"] = cols[8].trim();
          if (cols[9] && cols[9].trim()) duties["主要行程"] = cols[9].trim();

          // 🧠 人員自動提取
          const personnel = [];
          const nameRegex = /[\u4e00-\u9fa5]{2,4}/g;
          Object.values(duties).forEach(val => {
            const matches = val.match(nameRegex);
            if (matches) {
              matches.forEach(m => {
                if (!stopwords.includes(m) && !personnel.includes(m)) {
                  personnel.push(m);
                }
              });
            }
          });

          newSchedule.push({
            date: date,
            dayType: dayType,
            duties: duties,
            personnel: personnel,
            rawText: cols.join(' ')
          });
          importedCount++;
        }
      });

      if (newSchedule.length > 0) {
        CHURCH_CONFIG.scheduleData = newSchedule;
        CHURCH_CONFIG.year = document.getElementById('config-year').value;
        CHURCH_CONFIG.month = document.getElementById('config-month').value;
        CHURCH_CONFIG.bibleVerse.text = document.getElementById('config-verse').value;
        CHURCH_CONFIG.bibleVerse.source = document.getElementById('config-verse-src').value;

        initPageFromConfig();
        renderFullSchedule('all');
        showToast(`成功從 Excel 匯入 ${importedCount} 天事工！`);
      } else {
        showToast("解析失敗，請確認是否為 Excel 複製貼上格式。");
      }
    }

    // 產生 GitHub 的全新 index.html 設定檔
    function generateConfigCode() {
      CHURCH_CONFIG.year = document.getElementById('config-year').value;
      CHURCH_CONFIG.month = document.getElementById('config-month').value;
      CHURCH_CONFIG.bibleVerse.text = document.getElementById('config-verse').value;
      CHURCH_CONFIG.bibleVerse.source = document.getElementById('config-verse-src').value;

      const configStr = `let CHURCH_CONFIG = ` + JSON.stringify(CHURCH_CONFIG, null, 2) + `;`;
      document.getElementById('outputConfigArea').value = configStr;
      document.getElementById('outputCodeWrapper').classList.remove('hidden');
      showToast("程式碼產生完畢，請到下方複製！");
    }

    function copyGeneratedCode() {
      const area = document.getElementById('outputConfigArea');
      area.select();
      const success = document.execCommand('copy');
      if (success) {
        showToast("程式碼已複製！可貼回 index.html。");
      }
    }
  </script>
</body>
</html>
