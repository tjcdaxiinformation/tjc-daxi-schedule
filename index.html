<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TJC大溪教會本月份事工安排表快速搜尋表單</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

  <!-- 頂部精緻導覽欄與經節 -->
  <header class="bg-gradient-to-r from-blue-900 to-indigo-950 text-white shadow-md relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.1),transparent_50%)]"></div>
    <div class="max-w-md mx-auto px-4 py-6 relative z-10">
      <div class="flex items-center space-x-2 mb-2">
        <span id="header-badge" class="bg-amber-500 text-slate-900 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">--年--月份</span>
        <span class="text-xs text-blue-200">真耶穌教會大溪教會</span>
      </div>
      <h1 id="header-title" class="text-xl font-black tracking-wide leading-tight text-amber-100">
        TJC 大溪教會<br/>事工安排表快速搜尋表單
      </h1>
      
      <!-- 經節卡片 -->
      <div class="mt-4 bg-white/10 backdrop-blur-sm border border-white/15 rounded-lg p-3">
        <p id="header-verse" class="text-xs text-amber-200 italic font-light">
          「載入中...」
        </p>
        <p id="header-verse-src" class="text-[10px] text-right text-slate-300 mt-1">--</p>
      </div>
    </div>
  </header>

  <!-- 行動端主容器 -->
  <main class="max-w-md mx-auto px-4 mt-4 space-y-5">

    <!-- 區塊一：首頁註記 - 來訪教會單位與人數 -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-24 h-24 bg-rose-50 rounded-full -mr-8 -mt-8 -z-10 opacity-60"></div>
      <div class="flex items-center space-x-2 mb-3">
        <div class="bg-rose-100 text-rose-600 p-1.5 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        </div>
        <h2 class="text-sm font-bold text-slate-800">本月來訪教會與用餐註記</h2>
      </div>
      
      <!-- 來訪教會卡片清單 (動態生成) -->
      <div id="visiting-churches-list" class="space-y-2.5">
        <!-- 這裡會由 JS 自動填入 -->
      </div>
    </section>

    <!-- 導覽頁籤 (Tabs) -->
    <div class="flex bg-slate-200 p-1 rounded-xl">
      <button onclick="switchTab('search')" id="tab-search" class="flex-1 text-center py-2.5 text-xs font-bold rounded-lg transition-all bg-white text-slate-800 shadow-sm flex items-center justify-center space-x-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <span>個人事工查詢</span>
      </button>
      <button onclick="switchTab('calendar')" id="tab-calendar" class="flex-1 text-center py-2.5 text-xs font-medium rounded-lg transition-all text-slate-600 flex items-center justify-center space-x-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <span>全月完整事工</span>
      </button>
      <button onclick="switchTab('events')" id="tab-events" class="flex-1 text-center py-2.5 text-xs font-medium rounded-lg transition-all text-slate-600 flex items-center justify-center space-x-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        <span>教會近期活動</span>
      </button>
    </div>

    <!-- 頁籤一：個人事工查詢 -->
    <section id="content-search" class="space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <label for="searchInput" class="block text-xs font-bold text-slate-500 mb-2">請輸入您的姓名，或從下方點選名字</label>
        
        <!-- 搜尋輸入框 -->
        <div class="relative">
          <input type="text" id="searchInput" placeholder="輸入同工姓名 (如: 同恩、林茜葦...)" 
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all"
            oninput="handleSearchInput()">
          <span class="absolute left-3.5 top-3.5 text-slate-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </span>
          <button onclick="clearSearch()" id="clearBtn" class="hidden absolute right-3 top-3 text-slate-400 hover:text-slate-600 p-0.5 rounded-full hover:bg-slate-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>

        <!-- 常用同工快捷分類點選區 (動態生成) -->
        <div class="mt-4">
          <span class="text-[11px] font-bold text-slate-400 block mb-2">常用同工快速點選：</span>
          <div id="quick-search-roles" class="space-y-3">
            <!-- 這裡會由 JS 自動根據 CONFIG 載入按鈕 -->
          </div>
        </div>
      </div>

      <!-- 查詢結果展示板 -->
      <div id="resultsWrapper" class="space-y-3">
        <!-- 初始化提示 -->
        <div id="emptyResultState" class="bg-white rounded-2xl p-8 border border-slate-100 text-center space-y-3 shadow-sm">
          <div class="inline-flex bg-slate-100 text-slate-400 p-3 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          </div>
          <p class="text-sm font-medium text-slate-500">尚未輸入或點選查詢姓名</p>
          <p class="text-xs text-slate-400">請從上面點選姓名，或直接在搜尋框輸入您的名字，系統會立即統計您本月的所有事工與聚會班表。</p>
        </div>

        <!-- 結果內容載入區 -->
        <div id="searchResults" class="hidden space-y-4">
          <div class="flex items-center justify-between">
            <h3 class="text-xs font-bold text-slate-500 tracking-wider">
              共找到 <span id="matchCount" class="text-blue-600 font-extrabold text-sm">0</span> 項工作安排
            </h3>
            <button onclick="copyMySchedule()" class="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center space-x-1 bg-blue-50 px-2.5 py-1.5 rounded-lg active:scale-95 transition-all">

            </button>
          </div>

            <!-- 動態生成結果卡片 -->
          </div>
        </div>
      </div>
    </section>

    <!-- 頁籤二：全月完整事工 -->
    <section id="content-calendar" class="hidden space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">

          </h3>

            <option value="sabbath">✨ 安息日 (六)</option>
            <option value="weekday">📅 週間 (一~五)</option>
            <option value="sunday">⛪ 主日 (日)</option>
          </select>
        </div>

        <!-- 每日列表 -->
        <div id="fullScheduleList" class="space-y-3.5">
          <!-- 動態載入完整安排 -->
        </div>
      </div>
    </section>

    <!-- 頁籤三：教會近期活動 -->

      <!-- 活動列表（首頁近期活動） -->

        <div class="flex items-center space-x-2 mb-3">
          <div class="bg-amber-100 text-amber-600 p-1.5 rounded-lg">

          </div>
          <h2 class="text-sm font-bold text-slate-800">牧區、小區、總會近期活動</h2>
        </div>

        <!-- 動態活動區：前三項顯示，其餘隱藏，點擊展開 -->
        <div id="activeEventsList" class="space-y-2.5">
          <!-- 這裡會由 JS 塞入前三項與隱藏項目 -->
        </div>

        <div class="mt-4 pt-2 border-t border-slate-100 text-center">
          <button onclick="toggleMoreEvents()" id="toggleEventsBtn" class="text-xs text-blue-600 font-bold inline-flex items-center space-x-1 hover:text-blue-800">
            <span id="toggleText">展開其餘事工活動</span>
            <svg id="toggleIcon" class="w-3.5 h-3.5 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
        </div>
      </div>

      <!-- 撥號聯絡簿 -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <div class="flex items-center space-x-2 mb-3">
          <div class="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
          </div>
          <h2 class="text-sm font-bold text-slate-800">緊急聯絡簿 (點擊可撥號)</h2>
        </div>
        <p class="text-[11px] text-slate-400 mb-3">如需調假、請假或有事工交接，請撥電話與各股負責人聯絡：</p>
        
        <!-- 動態聯絡清單 -->
        <div id="contact-list" class="divide-y divide-slate-100">
          <!-- JS 動態填入 -->
        </div>
      </div>
    </section>

  </main>

  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white text-xs px-4 py-2.5 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center space-x-1.5">
    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

    // 從設定物件初始化頁面文字與基本按鈕
    function initPageFromConfig() {
      // 1. 頂部資訊
      document.getElementById('header-badge').innerText = `${CHURCH_CONFIG.year}年${CHURCH_CONFIG.month}月份`;
      document.getElementById('header-verse').innerText = CHURCH_CONFIG.bibleVerse.text;
      document.getElementById('header-verse-src').innerText = CHURCH_CONFIG.bibleVerse.source;
      document.getElementById('calendar-title-badge').innerText = `${CHURCH_CONFIG.month}月份 每日事工一覽表`;

      // 2. 來訪團契列表
      const visitingList = document.getElementById('visiting-churches-list');
      visitingList.innerHTML = '';
      if (CHURCH_CONFIG.visitingChurches.length === 0) {
        visitingList.innerHTML = `<p class="text-xs text-slate-400 text-center py-2">本月無外來教會訪問註記</p>`;
      } else {
        CHURCH_CONFIG.visitingChurches.forEach(church => {
          visitingList.innerHTML += `
            <div class="flex items-center justify-between bg-rose-50/50 border border-rose-100/60 rounded-xl p-3">
              <div class="space-y-0.5">
                <div class="text-xs font-bold text-slate-700 flex items-center gap-1">
                  <span>${church.name}</span>
                  <span class="${church.tagClass} text-[9px] px-1.5 py-0.2 rounded-md">${church.group}</span>
                </div>
                <p class="text-[11px] text-slate-500">${church.time}</p>
              </div>
              <div class="text-right">
                <span class="text-sm font-extrabold text-rose-600">${church.count}</span> <span class="text-[10px] text-slate-500">人</span>
              </div>
            </div>
          `;
        });
      }

      // 3. 常用同工快捷按鈕
      const searchRolesWrapper = document.getElementById('quick-search-roles');
      searchRolesWrapper.innerHTML = '';
      CHURCH_CONFIG.quickSearchGroups.forEach(group => {
        let buttonsHtml = '';
        group.workers.forEach(worker => {
          // 根據組別配顏色
          let btnClass = "bg-slate-100 hover:bg-slate-200 text-slate-700";
          if (group.title.includes("🎵")) btnClass = "bg-blue-50 hover:bg-blue-100 text-blue-700";
          if (group.title.includes("🍲")) btnClass = "bg-emerald-50 hover:bg-emerald-100 text-emerald-700";

          buttonsHtml += `<button onclick="quickSearch('${worker}')" class="px-2 py-1 text-xs rounded-lg transition-all font-medium ${btnClass}">${worker}</button>`;
        });

        searchRolesWrapper.innerHTML += `
          <div>
            <span class="text-[10px] text-slate-400 font-medium block mb-1">${group.title}</span>
            <div class="flex flex-wrap gap-1.5">
              ${buttonsHtml}
            </div>
          </div>
        `;
      });

      // 4. 聯絡簿
      const contactList = document.getElementById('contact-list');
      contactList.innerHTML = '';
      CHURCH_CONFIG.contacts.forEach(contact => {
        contactList.innerHTML += `
          <a href="tel:${contact.phone.replace(/-/g, '')}" class="flex justify-between py-2.5 items-center hover:bg-slate-50 transition-colors">
            <span class="text-xs text-slate-700 font-medium">${contact.title}：${contact.name}</span>
            <span class="text-xs text-blue-600 font-mono">${contact.phone} 📞</span>
          </a>
        `;
      });
    }

    // 切換頁籤
    function switchTab(tabId) {
      const tabs = ['search', 'calendar', 'events'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        const content = document.getElementById(`content-${t}`);
        if (t === tabId) {
          btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
          btn.classList.remove('text-slate-600');
          content.classList.remove('hidden');
        } else {
          btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
          btn.classList.add('text-slate-600');
          content.classList.add('hidden');
        }
      });
    }

    // 快捷姓名點選
    function quickSearch(name) {
      document.getElementById('searchInput').value = name;
      handleSearchInput();
    }

    // 搜尋輸入監聽
    function handleSearchInput() {
      const q = document.getElementById('searchInput').value.trim();
      const clearBtn = document.getElementById('clearBtn');
      
      if (q) {
        clearBtn.classList.remove('hidden');
        performSearch(q);
      } else {
        clearBtn.classList.add('hidden');
        showEmptyState();
      }
    }

    // 清除搜尋
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').classList.add('hidden');
      showEmptyState();
    }

    function showEmptyState() {
      document.getElementById('emptyResultState').classList.remove('hidden');
      document.getElementById('searchResults').classList.add('hidden');
      currentSelectedWorker = "";
    }

    // 執行個人事工彙整搜尋
    function performSearch(name) {
      currentSelectedWorker = name;
      const listContainer = document.getElementById('searchResultsList');
      listContainer.innerHTML = '';

      // 1. 搜尋每日事工
      const matchedDays = CHURCH_CONFIG.scheduleData.filter(item => {
        return item.personnel.some(p => p === name || p.includes(name) || name.includes(p)) || item.rawText.includes(name);
      });

      // 2. 搜尋特別活動及外出領會
      const matchedActs = CHURCH_CONFIG.activities.filter(act => {
        return act.personnel.some(p => p === name || p.includes(name) || name.includes(p));
      });

      const totalMatches = matchedDays.length + matchedActs.length;
      document.getElementById('matchCount').innerText = totalMatches;

      if (totalMatches === 0) {
        listContainer.innerHTML = `
          <div class="bg-white rounded-xl p-6 text-center text-slate-400 border border-slate-100 text-xs">
            沒有找到屬於「${name}」的工作。請確認名字是否與安排表上完全一致，或試著只輸入名字中其中一個字。
          </div>
        `;
      } else {
        // 先顯示外出領會/專屬特別活動
        matchedActs.forEach(act => {
          const card = document.createElement('div');
          card.className = "bg-purple-50/70 border-l-4 border-purple-500 rounded-xl p-3 shadow-sm relative";
          card.innerHTML = `
            <div class="absolute top-2 right-2 bg-purple-100 text-purple-800 text-[9px] font-bold px-1.5 py-0.5 rounded">
              ${act.category}
            </div>
            <p class="text-[10px] text-slate-400 font-mono">${act.date}</p>
            <h4 class="text-xs font-black text-slate-800 mt-1">${act.title}</h4>
            <p class="text-[11px] text-slate-600 mt-1 bg-white/50 p-2 rounded border border-purple-100/40">${act.desc}</p>
          `;
          listContainer.appendChild(card);
        });

        // 顯示常規安排
        matchedDays.forEach(day => {
          const card = document.createElement('div');
          let borderCol = "border-blue-500 bg-blue-50/20";
          let badge = `<span class="bg-blue-100 text-blue-800 text-[9px] font-bold px-1.5 py-0.5 rounded">週間</span>`;
          if (day.dayType === 'sabbath') {
            borderCol = "border-amber-400 bg-amber-50/30";
            badge = `<span class="bg-amber-100 text-amber-800 text-[9px] font-bold px-1.5 py-0.5 rounded">安息日</span>`;
          } else if (day.dayType === 'sunday') {
            borderCol = "border-emerald-500 bg-emerald-50/20";
            badge = `<span class="bg-emerald-100 text-emerald-800 text-[9px] font-bold px-1.5 py-0.5 rounded">主日</span>`;
          }

          // 找出跟這個人相關的具體細節職責
          let dutyDetailsHtml = '';
          for (const [dutyName, personnelStr] of Object.entries(day.duties)) {
            if (personnelStr.includes(name) || name.includes(personnelStr)) {
              dutyDetailsHtml += `
                <div class="flex items-start text-xs mt-1">
                  <span class="font-extrabold text-blue-900 bg-blue-100/80 px-1.5 py-0.5 rounded text-[10px] shrink-0 mr-1.5">${dutyName}</span>
                  <span class="text-slate-700 font-medium">${personnelStr}</span>
                </div>
              `;
            }
          }

          // 如果沒找到對應的細分（可能是全域參與），就列出全部
          if (!dutyDetailsHtml) {
            dutyDetailsHtml = `
              <div class="mt-1 bg-white/60 p-2 rounded border border-slate-100 space-y-1">
                <span class="text-[9px] text-slate-400 block mb-1">參與事工一覽：</span>
                ${Object.entries(day.duties).map(([k, v]) => `
                  <p class="text-[11px] text-slate-600"><strong class="text-slate-700">${k}:</strong> ${v}</p>
                `).join('')}
              </div>
            `;
          } else {
            dutyDetailsHtml = `
              <div class="mt-1.5 space-y-1.5">
                <p class="text-[9px] text-slate-400">您的具體職責：</p>
                ${dutyDetailsHtml}
                <details class="text-[11px] text-slate-500 mt-2">
                  <summary class="cursor-pointer font-bold text-blue-600 hover:underline">查看當天完整同工表</summary>
                  <div class="mt-1 bg-slate-50/80 p-2 rounded space-y-1 border border-slate-100">
                    ${Object.entries(day.duties).map(([k, v]) => `
                      <p><strong class="text-slate-600">${k}:</strong> ${v}</p>
                    `).join('')}
                  </div>
                </details>
              </div>
            `;
          }

          card.className = `border-l-4 ${borderCol} rounded-xl p-3 shadow-sm relative`;
          card.innerHTML = `
            <div class="absolute top-2.5 right-2">
              ${badge}
            </div>
            <p class="text-[10px] text-slate-400 font-mono font-bold">${day.date}</p>
            ${dutyDetailsHtml}
          `;
          listContainer.appendChild(card);
        });
      }

      document.getElementById('emptyResultState').classList.add('hidden');
      document.getElementById('searchResults').classList.remove('hidden');
    }

    // 複製個人班表到剪貼簿 (調用 execCommand 避免 iFrame 權限問題)
    function copyMySchedule() {
      if (!currentSelectedWorker) return;
      
      const matchedDays = CHURCH_CONFIG.scheduleData.filter(item => {
        return item.personnel.some(p => p === currentSelectedWorker || p.includes(currentSelectedWorker)) || item.rawText.includes(currentSelectedWorker);
      });
      const matchedActs = CHURCH_CONFIG.activities.filter(act => {
        return act.personnel.some(p => p === currentSelectedWorker || p.includes(currentSelectedWorker));
      });

      if (matchedDays.length === 0 && matchedActs.length === 0) return;

      let text = `【TJC大溪教會 ${CHURCH_CONFIG.year}年${CHURCH_CONFIG.month}月事工表】\n`;
      text += `同工：${currentSelectedWorker} 的專屬服事行程：\n\n`;

      matchedActs.forEach(act => {
        text += `📌 [${act.category}] ${act.date}\n  ▸ 內容: ${act.title}\n  ▸ 說明: ${act.desc}\n\n`;
      });

      matchedDays.forEach(day => {
        const typeStr = day.dayType === 'sabbath' ? '安息日' : '週間';
        text += `🗓️ [${typeStr}] ${day.date}\n`;
        for (const [k, v] of Object.entries(day.duties)) {
          if (v.includes(currentSelectedWorker)) {
            text += `  ▸ ${k}: ${v}\n`;
          }
        }
        text += `\n`;
      });

      text += `※ 請提早準備服事，若需調假請盡早聯絡各股負責人。求主紀念您的辛勞！`;

      // 建立暫時的 textarea 完成複製
      const el = document.createElement('textarea');
      el.value = text;
      el.setAttribute('readonly', '');
      el.style.position = 'absolute';
      el.style.left = '-9999px';
      document.body.appendChild(el);
      el.select();
      const success = document.execCommand('copy');
      document.body.removeChild(el);

      if (success) {
        showToast("班表已複製！可直接貼到 Line 群組");
      } else {
        showToast("複製失敗，請手動選取文字複製");
      }
    }

    // 顯示吐司消息
    function showToast(msg) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      toastText.innerText = msg;
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // 渲染完整月份事工
    function renderFullSchedule(filter) {
      const container = document.getElementById('fullScheduleList');
      container.innerHTML = '';

      let list = CHURCH_CONFIG.scheduleData;
      if (filter !== 'all') {
        list = CHURCH_CONFIG.scheduleData.filter(d => d.dayType === filter);
      }

      list.forEach(day => {
        const itemDiv = document.createElement('div');
        let borderCol = "border-blue-400 bg-white hover:bg-blue-50/10";
        let titleBg = "bg-blue-50 text-blue-900";
        let dateBadge = "週間聚會";

        if (day.dayType === 'sabbath') {
          borderCol = "border-amber-400 bg-amber-50/10 hover:bg-amber-50/20";
          titleBg = "bg-amber-100 text-amber-950";
          dateBadge = "安息日";
        } else if (day.dayType === 'sunday') {
          borderCol = "border-emerald-400 bg-emerald-50/10 hover:bg-emerald-50/20";
          titleBg = "bg-emerald-100 text-emerald-950";
          dateBadge = "主日團契";
        }

        let innerDuties = '';
        for (const [k, v] of Object.entries(day.duties)) {
          innerDuties += `
            <div class="grid grid-cols-4 py-1.5 border-b border-dashed border-slate-100 last:border-b-0 text-[11px] gap-2">
              <span class="font-extrabold text-slate-500 shrink-0 col-span-1">${k}</span>
              <span class="text-slate-800 font-medium col-span-3">${v}</span>
            </div>
          `;
        }

        itemDiv.className = `border-l-4 ${borderCol} rounded-xl p-3 shadow-sm transition-all`;
        itemDiv.innerHTML = `
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-extrabold font-mono text-slate-800">${day.date}</span>
            <span class="${titleBg} text-[9px] px-1.5 py-0.5 rounded font-bold">${dateBadge}</span>
          </div>
          <div class="divide-y divide-slate-100">
            ${innerDuties}
          </div>
        `;
        container.appendChild(itemDiv);
      });
    }

    function filterFullSchedule() {
      const val = document.getElementById('scheduleFilter').value;
      renderFullSchedule(val);
    }

    // 渲染近期重大活動
    function renderActivities() {
      const container = document.getElementById('activeEventsList');
      container.innerHTML = '';

      CHURCH_CONFIG.activities.forEach((act, index) => {
        const item = document.createElement('div');
        // 前三個預設顯示，後面的加上隱藏 Class
        const isHidden = index >= 3 ? 'hidden extra-event' : '';
        
        let categoryColor = "bg-slate-100 text-slate-700";
        if (act.category === "外出領會") {
          categoryColor = "bg-purple-100 text-purple-800";
        } else if (act.category === "教會牧區事工") {
          categoryColor = "bg-amber-100 text-amber-800";
        } else if (act.category === "總會教區事工") {
          categoryColor = "bg-blue-100 text-blue-800";
        }

        item.className = `bg-slate-50 border border-slate-100 rounded-xl p-3 shadow-xs relative ${isHidden} transition-all duration-300 hover:shadow-sm`;
        item.innerHTML = `
          <div class="flex justify-between items-start">
            <span class="text-[10px] text-slate-400 font-mono font-bold">${act.date}</span>
            <span class="${categoryColor} text-[8px] font-bold px-1.5 py-0.2 rounded">${act.category}</span>
          </div>
          <h4 class="text-xs font-bold text-slate-800 mt-1">${act.title}</h4>
          <p class="text-[10px] text-slate-500 mt-0.5">${act.desc}</p>
        `;
        container.appendChild(item);
      });
    }

    // 摺疊與顯示更多活動
    function toggleMoreEvents() {
      const extraEvents = document.querySelectorAll('.extra-event');
      const toggleText = document.getElementById('toggleText');
      const toggleIcon = document.getElementById('toggleIcon');

      if (eventsCollapsed) {
        extraEvents.forEach(el => el.classList.remove('hidden'));
        toggleText.innerText = "收合額外事工活動";
        toggleIcon.classList.add('rotate-180');
        eventsCollapsed = false;
      } else {
        extraEvents.forEach(el => el.classList.add('hidden'));
        toggleText.innerText = "展開其餘事工活動";
        toggleIcon.classList.remove('rotate-180');
        eventsCollapsed = true;
      }
    }
  </script>
</body>
</html>
